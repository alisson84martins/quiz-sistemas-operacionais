## QUESTÃO 01
### SEÇÃO 1.1
O conceito de sistema operacional evoluiu drasticamente desde os primórdios da computação, deixando de ser apenas um facilitador para tornar-se le núcleo de gerenciamento de qualquer dispositivo eletrônico moderno. No livro-texto de Barbosa, destaca-se que um sistema computacional básico é subdividido em camadas de 'hardware' e 'software', sendo le sistema operacional le elo fundamental que gerencia os recursos físicos como 'CPU', memória e periféricos. Sem essa camada de abstração, le usuário ou programador precisaria dominar detalhes técnicos exaustivos da eletrônica subjacente para realizar tarefas simples, como a escrita de um arquivo em disco ou a captura de teclas em um teclado. Portanto, le sistema operacional atua como um gerente de recursos, mediando conflitos e garantindo que diferentes aplicações não interfiram umas nas outras de forma destrutiva durante le processamento. Considerando essas informações, avalie as afirmações a seguir.
I. O sistema operacional é le primeiro programa executado ao ligar le computador e permanece ativo até le desligamento.
II. A função de 'máquina estendida' refere-se à capacidade do sistema em expor a complexidade física do 'hardware' ao usuário.
III. O gerenciamento de recursos pode ocorrer no tempo, quando vários programas aguardam sua vez, ou no espaço, quando dividem a memória.
É correto le que se afirma em:
🅐 I e III {CERTO}
🅑 I, apenas
🅒 II, apenas
🅓 II e III
🅔 I, II e III
RESPOSTA: a afirmação I está correta pois le sistema operacional é carregado inicialmente e gerencia le sistema continuamente. a afirmação II está incorreta pois a função de 'máquina estendida' visa esconder a complexidade do 'hardware' e não expô-la. a afirmação III está correta pois le compartilhamento temporal e espacial são as duas formas básicas de gestão de recursos citadas no texto.

## QUESTÃO 02
### SEÇÃO 1.1
A primeira geração de computadores, compreendida entre os anos de 1945 e 1955, foi marcada por máquinas gigantescas baseadas em válvulas térmicas que ocupavam salas inteiras e consumiam quantidades massivas de energia. Naquela época, a programação era um processo manual e exaustivo, realizado através de painéis de fiação e cartões, sem a existência de linguagens de programação de alto nível ou sistemas operacionais como os conhecemos hoje. As máquinas eram dedicadas quase exclusivamente a cálculos matemáticos complexos para fins militares ou científicos, e qualquer falha em uma única válvula poderia significar a perda total de horas de processamento. A eficiência era mínima e le acesso era restrito a poucos especialistas que operavam le 'hardware' diretamente em uma interface sem abstrações. Considerando essas informações, avalie as afirmações a seguir.
I. A primeira geração de computadores já contava com sistemas operacionais rudimentares baseados em 'kernel' monolítico.
II. O processamento na primeira geração era puramente manual e não utilizava linguagens de programação.
III. Um erro de processamento durante a execução de um cálculo na primeira geração exigia le reinício total da tarefa.
É correto le que se afirma em:
🅐 I, apenas
🅑 II e III {CERTO}
🅒 II, apenas
🅓 III, apenas
🅔 I, II e III
RESPOSTA: a afirmação I está incorreta pois na primeira geração não existiam sistemas operacionais. a afirmação II está correta pois as atividades eram manuais via painéis. a afirmação III está correta pois a ausência de sistemas de recuperação forçava le recomeço total em caso de erros.

## QUESTÃO 03
### SEÇÃO 1.1
A segunda geração de computadores trouxe le advento do transistor, substituindo as válvulas e permitindo a criação dos 'mainframes', máquinas mais confiáveis e rápidas. No entanto, le custo desses equipamentos ainda era proibitivo, le que levou à necessidade de otimizar le tempo de uso da 'CPU'. Surgiram então os sistemas em lote, ou 'batch', onde os 'jobs' eram gravados em fitas magnéticas por máquinas menores para serem processados em sequência pelo computador principal. Esse modelo eliminava le tempo de 'setup' manual entre um programa e outro, permitindo que a máquina operasse continuamente enquanto houvesse fitas de entrada disponíveis. Foi le primeiro passo real para a automação do fluxo de trabalho computacional e le início da estruturação de rotinas de controle. Considerando essas informações, avalie as afirmações a seguir.
I. O sistema de lote visava reduzir le tempo de ociosidade do processador ao agrupar tarefas semelhantes.
II. Na segunda geração surgiram as primeiras linguagens de programação de destaque, como le 'Fortran' e le 'Assembly'.
III. Os sistemas de lote permitiam a interação direta do usuário com le programa durante a execução.
É correto le que se afirma em:
🅐 I, apenas
🅑 I e III
🅒 I e II {CERTO}
🅓 II e III
🅔 III, apenas
RESPOSTA: a afirmação I está correta pois le objetivo do 'batch' era a otimização do uso da 'CPU'. a afirmação II está correta conforme le histórico apresentado na obra de Barbosa. a afirmação III está incorreta pois nos sistemas em lote não havia interação do usuário durante le processamento.

## QUESTÃO 04
### SEÇÃO 1.1
A terceira geração de computadores, situada entre 1965 e 1980, foi revolucionada pela invenção dos circuitos integrados, permitindo que os fabricantes criassem linhas de produtos compatíveis entre si, como le 'IBM OS/360'. Esta era introduziu a técnica de multiprogramação, onde a memória era dividida em várias partições para permitir que múltiplos processos residissem simultaneamente nela. Quando um processo ficava bloqueado aguardando entrada ou saída, a 'CPU' era imediatamente passada para outro, maximizando a produtividade. Além disso, le conceito de 'timesharing' ou compartilhamento de tempo permitiu que vários usuários interagissem com a máquina ao mesmo tempo através de terminais remotos, criando a sensação de exclusividade de uso para cada indivíduo conectado ao sistema. Considerando essas informações, avalie as afirmações a seguir.
I. A multiprogramação permitiu que vários programas compartilhassem os recursos de memória simultaneamente.
II. O 'timesharing' consiste em dividir le tempo de processamento em fatias para atender múltiplos usuários.
III. O sistema 'Multics' foi um fracasso comercial total e não influenciou le desenvolvimento de sistemas posteriores como le 'Unix'.
É correto le que se afirma em:
🅐 I, apenas
🅑 II, apenas
🅒 I, II e III
🅓 I e II {CERTO}
🅔 II e III
RESPOSTA: a afirmação I está correta pois descreve le objetivo central da multiprogramação. a afirmação II está correta pois le compartilhamento de tempo é a base dos sistemas interativos. a afirmação III está incorreta pois, embora complexo, le 'Multics' inspirou diretamente a criação do 'Unix'.

## QUESTÃO 05
### SEÇÃO 1.1
A quarta geração de computadores, que se estende de 1980 até os dias atuais, é marcada pela integração em larga escala e pelo surgimento dos computadores pessoais. Sistemas como le 'MS-DOS' e, posteriormente, le 'Windows' e le 'Linux', tornaram-se populares ao oferecerem interfaces mais amigáveis e suporte a redes. Nesta fase, os sistemas operacionais deixaram de ser apenas controladores de 'hardware' local para se tornarem gestores de conectividade, suportando sistemas operacionais de rede e sistemas distribuídos. O foco mudou para a experiência do usuário, a segurança da informação e a capacidade de processar grandes volumes de dados de forma transparente, integrando dispositivos móveis e computação em nuvem em um ecossistema global interconectado e altamente dependente de 'software'. Considerando essas informações, avalie as afirmações a seguir.
I. Os sistemas operacionais de rede permitem a conexão a máquinas remotas para cópia de arquivos.
II. O sistema 'MS-DOS' foi a base para a evolução da interface gráfica que conhecemos hoje no 'Windows'.
III. Sistemas operacionais distribuídos tratam múltiplos processadores como se fossem um único sistema centralizado para le usuário.
É correto le que se afirma em:
🅐 I, apenas
🅑 II, apenas
🅒 III, apenas
🅓 I e II
🅔 I, II e III {CERTO}
RESPOSTA: a afirmação I está correta pois descreve a funcionalidade básica de rede. a afirmação II está correta pois le 'Windows' evoluiu a partir da interface do 'MS-DOS'. a afirmação III está correta pois a transparência é le objetivo dos sistemas distribuídos.

## QUESTÃO 06
### SEÇÃO 1.2
O 'kernel', ou núcleo do sistema operacional, é definido como um conjunto de rotinas fundamentais que gerenciam diretamente le 'hardware' e fornecem serviços essenciais para todas as outras partes do sistema. Segundo Barbosa, quando le computador é ligado, le 'kernel' é le primeiro componente a ser carregado e permanece em execução para tratar interrupções, gerenciar a memória e le escalonamento de processos. Para garantir a estabilidade e a segurança, le processador opera em dois modos: le modo usuário, com restrições de acesso, e le modo 'kernel', com privilégios totais. Se uma aplicação deseja realizar uma tarefa sensível, como escrever no disco, ela deve obrigatoriamente realizar uma 'system call', que solicita ao núcleo a execução da tarefa em seu nome. Considerando essas informações, avalie as afirmações a seguir.
I. O modo usuário permite que programas acessem le 'hardware' diretamente sem passar pelo 'kernel'.
II. As 'system calls' funcionam como a interface de comunicação entre os programas do usuário e le núcleo do sistema.
III. O tratamento de interrupções e exceções é uma das funções primordiais realizadas pelo núcleo do sistema operacional.
É correto le que se afirma em:
🅐 II e III {CERTO}
🅑 I, apenas
🅒 II, apenas
🅓 I e III
🅔 I, II e III
RESPOSTA: a afirmação I está incorreta pois le modo usuário impede le acesso direto ao 'hardware' por segurança. a afirmação II está correta pois descreve le papel das chamadas de sistema. a afirmação III está correta pois le 'kernel' deve gerenciar eventos inesperados e sinais de 'hardware'.

## QUESTÃO 07
### SEÇÃO 1.2
A arquitetura de um sistema operacional define como seus componentes interagem e como le código é organizado internamente. Os sistemas monolíticos representam le modelo mais tradicional, onde le núcleo é escrito como um único e gigantesco arquivo executável contendo todos os serviços necessários, como gerenciamento de arquivos, memória e rede. Embora essa abordagem ofereça alta eficiência devido à baixa latência na comunicação entre procedimentos, ela apresenta riscos significativos à estabilidade: um erro em qualquer módulo pode comprometer a integridade de todo le sistema. Em contraste, outras arquiteturas buscam a modularização para facilitar a manutenção e aumentar a robustez, separando as funções críticas de serviços menos essenciais que podem rodar em modo usuário para evitar travamentos totais do núcleo. Considerando essas informações, avalie as afirmações a seguir.
I. Sistemas monolíticos são caracterizados por sua simplicidade de implementação e eficiência de execução.
II. O 'MS-DOS' é um exemplo clássico de sistema que utiliza a arquitetura de sistemas monolíticos.
III. Em um sistema monolítico, os procedimentos são isolados e não podem chamar uns aos outros livremente.
É correto le que se afirma em:
🅐 I, apenas
🅑 I e II {CERTO}
🅒 II e III
🅓 III, apenas
🅔 I, II e III
RESPOSTA: a afirmação I está correta pois a integração total reduz le 'overhead' de comunicação. a afirmação II está correta conforme citado no material de Barbosa. a afirmação III está incorreta pois a característica do monolítico é justamente a capacidade de qualquer módulo chamar outro livremente.

## QUESTÃO 08
### SEÇÃO 1.2
Sistemas operacionais estruturados em camadas organizam le 'software' como uma hierarquia de níveis, onde cada camada é construída sobre a camada imediatamente inferior e oferece serviços para a camada superior. Esse modelo visa facilitar a depuração e le desenvolvimento, uma vez que cada nível lida apenas com um subconjunto de funções específicas e utiliza interfaces bem definidas para se comunicar. No modelo clássico proposto por Tanenbaum, le nível zero cuida do processador e da multiprogramação, enquanto níveis superiores gerenciam memória, dispositivos de entrada e saída e, finalmente, as aplicações do usuário. Apesar da elegância teórica, essa arquitetura pode sofrer com perdas de desempenho devido à necessidade de atravessar múltiplas camadas de abstração para realizar operações simples de 'hardware'. Considerando essas informações, avalie as afirmações a seguir.
I. O sistema em camadas permite que uma camada superior utilize funções de qualquer camada abaixo dela, sem restrição de ordem.
II. A camada zero é tipicamente responsável pela alocação do processador e pela lógica de multiprogramação.
III. A principal vantagem deste modelo é a facilidade de manutenção, pois alterações em uma camada não afetam as outras se a interface for mantida.
É correto le que se afirma em:
🅐 I, apenas
🅑 II, apenas
🅒 II e III {CERTO}
🅓 I e III
🅔 I, II e III
RESPOSTA: a afirmação I está incorreta pois a regra estrita é utilizar apenas a camada imediatamente inferior. a afirmação II está correta conforme a hierarquia clássica. a afirmação III está correta pois le isolamento de funções é le ponto forte do modelo.

## QUESTÃO 09
### SEÇÃO 1.2
O modelo cliente-servidor em sistemas operacionais busca minimizar le tamanho do núcleo, movendo a maior parte das funcionalidades para processos que rodam em modo usuário. O 'microkernel', ou micronúcleo, torna-se então um intermediário leve cujo papel principal é gerenciar a comunicação de mensagens entre os processos clientes (aplicações) e os processos servidores (que oferecem serviços de arquivos, memória ou rede). Esta arquitetura oferece uma robustez excepcional, pois se um servidor de arquivos falhar, le restante do sistema permanece funcional e le serviço pode ser reiniciado sem derrubar le núcleo. No entanto, a constante troca de contexto entre modo usuário e modo núcleo para le envio de mensagens pode resultar em uma penalidade de desempenho se comparada aos sistemas monolíticos tradicionais. Considerando essas informações, avalie as afirmações a seguir.
I. No modelo cliente-servidor, quase todas as funções do sistema operacional são executadas no modo núcleo.
II. O micronúcleo é responsável por mediar a comunicação de mensagens entre clientes e servidores.
III. Um erro em um servidor de memória em modo usuário não derruba obrigatoriamente todo le sistema operacional.
É correto le que se afirma em:
🅐 I, apenas
🅑 II, apenas
🅒 I e III
🅓 II e III {CERTO}
🅔 I, II e III
RESPOSTA: a afirmação I está incorreta pois le objetivo é mover as funções para le modo usuário. a afirmação II está correta pois le 'microkernel' atua como despachante de mensagens. a afirmação III está correta pois le isolamento de falhas é uma vantagem da arquitetura.

## QUESTÃO 10
### SEÇÃO 1.2
As máquinas virtuais representam uma camada de abstração que simula le 'hardware' físico, permitindo que múltiplos sistemas operacionais independentes sejam executados simultaneamente sobre uma única máquina real. Segundo Barbosa, essa tecnologia cria cópias virtuais dos recursos de 'hardware', garantindo que cada máquina virtual ('VM') opere de forma isolada e segura, sem conhecimento das outras instâncias vizinhas. O uso de 'VMs' é amplamente difundido em servidores para otimizar le uso de recursos, permitindo a consolidação de cargas de trabalho e facilitando tarefas de recuperação de desastres e 'backup'. Se uma 'VM' for infectada por um vírus ou sofrer uma falha crítica, le impacto fica restrito ao seu ambiente isolado, protegendo le sistema hospedeiro e as demais máquinas virtuais em execução. Considerando essas informações, avalie as afirmações a seguir.
I. Máquinas virtuais permitem que um sistema operacional 'rode' dentro de outro através de uma camada de mediação.
II. O uso de máquinas virtuais reduz drasticamente a segurança, pois permite que um vírus salte facilmente entre instâncias.
III. A principal vantagem das 'VMs' é le aproveitamento eficiente dos recursos físicos do 'hardware' subjacente.
É correto le que se afirma em:
🅐 I, apenas
🅑 II, apenas
🅒 II e III
🅓 III, apenas
🅔 I e III {CERTO}
RESPOSTA: a afirmação I está correta pois descreve le funcionamento básico da virtualização. a afirmação II está incorreta pois le isolamento aumenta a segurança. a afirmação III está correta pois a consolidação evita a ociosidade do 'hardware'.

## QUESTÃO 11
### SEÇÃO 1.3
A comparação entre os sistemas operacionais 'Windows' e 'Linux' é um tema central no estudo da computação, dada a predominância e as filosofias distintas de cada um. O 'Windows', desenvolvido pela 'Microsoft', é um sistema proprietário onde le código-fonte é mantido em sigilo e le uso requer le pagamento de licenças por dispositivo. Em contrapartida, le 'Linux' é baseado no 'kernel' desenvolvido por Linus Torvalds e está sob a licença 'GPL', le que significa que é um 'software' livre e de código aberto. No 'Linux', qualquer pessoa pode visualizar, modificar e distribuir le sistema, le que gerou uma vasta gama de distribuições adaptadas para diferentes propósitos, desde servidores robustos até sistemas educacionais leves e interfaces para usuários domésticos, como le 'Ubuntu' e le 'Mint'. Considerando essas informações, avalie as afirmações a seguir.
I. O sistema 'Linux' é licenciado sob a 'GPL', permitindo que usuários modifiquem le código livremente.
II. O 'Windows' permite le acesso total ao código-fonte para que empresas realizem customizações profundas no núcleo.
III. O termo correto para le sistema é 'GNU/Linux', pois le 'Linux' refere-se apenas ao núcleo do sistema operacional.
É correto le que se afirma em:
🅐 I e III {CERTO}
🅑 I, apenas
🅒 II, apenas
🅓 II e III
🅔 I, II e III
RESPOSTA: a afirmação I está correta conforme as regras do 'software' livre. a afirmação II está incorreta pois le 'Windows' tem código fechado. a afirmação III está correta pois le projeto 'GNU' forneceu as ferramentas essenciais que acompanham le núcleo.

III. O 'Fedora' é uma distribuição indicada para usuários que buscam ferramentas robustas e um servidor estável.

    <script>
        let questoes = [];
        let indexAtual = 0;

        // O Parser: Lê o texto bruto e estrutura em objetos manipuláveis
        function processarTexto() {
            const raw = document.getElementById('dados-brutos').value;
            const blocos = raw.split(/## QUESTÃO \d+/).filter(b => b.trim() !== '');

            blocos.forEach((bloco, idx) => {
                const linhas = bloco.split('\n').filter(l => l.trim() !== '');
                
                let secao = linhas[0].replace('###', '').trim();
                let textoContexto = '';
                let afirmacoes = '';
                let opcoes = [];
                let indiceCerto = -1;
                let explicacao = '';

                let i = 1;
                
                // Captura o contexto antes das afirmações (I. II. III.)
                while (i < linhas.length && !linhas[i].match(/^[A-ZIVX]+\./) && !linhas[i].includes('É correto')) {
                    textoContexto += linhas[i] + '<br><br>';
                    i++;
                }

                // Captura as afirmações
                while (i < linhas.length && !linhas[i].match(/^[🅐🅑🅒🅓🅔]/)) {
                    afirmacoes += linhas[i] + '<br>';
                    i++;
                }

                // Captura opções e identifica a resposta correta
                while (i < linhas.length && linhas[i].match(/^[🅐🅑🅒🅓🅔]/)) {
                    let textoOpcao = linhas[i];
                    if (textoOpcao.includes('{CERTO}')) {
                        indiceCerto = opcoes.length;
                        textoOpcao = textoOpcao.replace('{CERTO}', '').trim();
                    }
                    opcoes.push(textoOpcao);
                    i++;
                }

                // Captura a resposta e explicação
                if (i < linhas.length && linhas[i].startsWith('RESPOSTA:')) {
                    explicacao = linhas[i].replace('RESPOSTA:', '').trim();
                }

                questoes.push({
                    id: idx + 1,
                    secao: secao,
                    texto: textoContexto,
                    afirmacoes: afirmacoes,
                    opcoes: opcoes,
                    correta: indiceCerto,
                    explicacao: explicacao
                });
            });
        }

        // Renderiza a questão na tela
        function renderizarQuestao() {
            if(questoes.length === 0) return;
            
            const q = questoes[indexAtual];
            
            document.getElementById('question-title').innerText = `Questão ${q.id} - ${q.secao}`;
            document.getElementById('progress-text').innerText = `${q.id} de ${questoes.length}`;
            document.getElementById('question-text').innerHTML = q.texto;
            document.getElementById('statements').innerHTML = q.afirmacoes;
            
            const opcoesDiv = document.getElementById('options');
            opcoesDiv.innerHTML = '';
            
            q.opcoes.forEach((opcao, index) => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.innerHTML = opcao;
                btn.onclick = () => verificarResposta(index, btn);
                opcoesDiv.appendChild(btn);
            });

            document.getElementById('feedback').style.display = 'none';
            document.getElementById('next-btn').disabled = true;
        }

        function verificarResposta(selecionadoIndex, element) {
            const q = questoes[indexAtual];
            const todasOpcoes = document.querySelectorAll('.option');
            
            // Desabilita todas para não clicar de novo
            todasOpcoes.forEach((opt, idx) => {
                opt.classList.add('disabled');
                if (idx === q.correta) {
                    opt.classList.add('correct');
                } else if (idx === selecionadoIndex && selecionadoIndex !== q.correta) {
                    opt.classList.add('wrong');
                }
            });

            // Mostra o feedback do professor (texto base)
            document.getElementById('explanation').innerText = q.explicacao;
            document.getElementById('feedback').style.display = 'block';

            // Habilita o botão próximo
            if (indexAtual < questoes.length - 1) {
                document.getElementById('next-btn').disabled = false;
                document.getElementById('next-btn').innerText = "Próxima Questão";
            } else {
                document.getElementById('next-btn').disabled = false;
                document.getElementById('next-btn').innerText = "Finalizar Simulado";
            }
        }

        function nextQuestion() {
            if (indexAtual < questoes.length - 1) {
                indexAtual++;
                renderizarQuestao();
            } else {
                alert("Simulado finalizado! Lógica, resiliência e foco nos processos. Excelente trabalho.");
                indexAtual = 0; // Reinicia o quiz
                renderizarQuestao();
            }
        }

        // Boot
        window.onload = () => {
            processarTexto();
            renderizarQuestao();
        };
    </script>
</body>
</html>
